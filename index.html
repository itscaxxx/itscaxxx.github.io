<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open it po</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title"></h1>
        
        <div class="envelope-wrapper">
            <div id="butterfly-container"></div>

            <div class="envelope">
                <div class="pearl-seal"></div>
                
                <div class="letter">
                    <div class="letter-content">
                        <span class="to-tag">To: My baby</span>
                        <p class="message-line highlight">Dear, baby. Imissyousomuch na ga</p>
                        <p class="message-line highlight">Miss mo rin ga ako? HAHAHAHAHAHA</p>
                        <p class="message-line">Balagbag ba, ginawan ka ng letter</p>
                        <p class="message-line">Hay nako, miss na kita sobra, ano na. Lapit na, char.</p>
                        <p class="message-line">De joke, eto na, gusto ko lang na sabihin na ang ganda mo sobra. 💙</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="buttons">
            <button id="openBtn">OPEN</button>
            <button id="closeBtn">CLOSE</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
